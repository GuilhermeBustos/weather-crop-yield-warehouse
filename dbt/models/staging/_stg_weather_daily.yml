version: 2

models:
  - name: stg_weather_daily
    description: >
      Deduplicated passthrough of raw.weather_daily. Keeps the latest
      _ingested_at row per (fips, date) grain using ROW_NUMBER(). Open-Meteo
      column names are preserved except shortwave_radiation_sum (→
      solar_radiation_mjm2) and windspeed_10m_max (→ wind_speed_kmh).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [fips, date]
    columns:
      - name: fips
        description: 5-digit county FIPS code (STRING).
        data_tests:
          - not_null
      - name: date
        description: Observation date.
        data_tests:
          - not_null
      - name: temperature_2m_max
        description: Daily maximum temperature at 2 m in °C.
        data_tests:
          - not_null
      - name: temperature_2m_min
        description: Daily minimum temperature at 2 m in °C.
        data_tests:
          - not_null
      - name: temperature_2m_mean
        description: Daily mean temperature at 2 m in °C.
      - name: precipitation_sum
        description: Daily precipitation total in mm.
        data_tests:
          - not_null
      - name: et0_fao_evapotranspiration
        description: Reference evapotranspiration (FAO-56 Penman-Monteith) in mm.
      - name: solar_radiation_mjm2
        description: Surface shortwave radiation sum in MJ m⁻² (shortwave_radiation_sum).
      - name: wind_speed_kmh
        description: Maximum wind speed at 10 m in km h⁻¹ (windspeed_10m_max).
      - name: _ingested_at
        description: UTC timestamp of the ingestion run that wrote the source row.
        data_tests:
          - not_null
