version: 2

sources:
  - name: raw
    schema: "{{ env_var('DBT_RAW_DATASET', 'raw') }}"
    description: >
      Raw ingestion layer loaded by the Python pipelines (Phase 2).
      All columns are typed as-landed; parsing and deduplication happen
      in the staging layer.

    tables:
      - name: weather_daily
        description: >
          One row per (fips, date) as fetched from the Open-Meteo API.
          Column names are the Open-Meteo native variable names; stg_weather_daily
          renames them to shorter analytical names with unit suffixes.
          Partitioned by date, clustered by fips. May contain duplicate
          (fips, date) pairs across ingestion runs; stg_weather_daily
          deduplicates on latest _ingested_at.
        columns:
          - name: fips
            description: 5-digit county FIPS code (STRING).
          - name: latitude
            description: Centroid latitude used to fetch the forecast (FLOAT64).
          - name: longitude
            description: Centroid longitude used to fetch the forecast (FLOAT64).
          - name: date
            description: Observation date (DATE).
          - name: temperature_2m_max
            description: Daily maximum temperature at 2 m in °C.
          - name: temperature_2m_min
            description: Daily minimum temperature at 2 m in °C.
          - name: temperature_2m_mean
            description: Daily mean temperature at 2 m in °C.
          - name: precipitation_sum
            description: Daily precipitation total in mm.
          - name: et0_fao_evapotranspiration
            description: Reference evapotranspiration (FAO-56 Penman-Monteith) in mm.
          - name: shortwave_radiation_sum
            description: Surface shortwave radiation sum in MJ m⁻².
          - name: windspeed_10m_max
            description: Maximum wind speed at 10 m in km h⁻¹.
          - name: _ingested_at
            description: UTC timestamp when the row was written to BigQuery.

      - name: nass_yield
        description: >
          Raw NASS Quick Stats crop yield records for corn and soybeans,
          COUNTY and STATE aggregation levels, 2025 season.
          value_raw is kept as STRING to preserve suppression flags
          such as (D), (Z), and (NA); stg_nass_yield parses it to numeric.
          Note: agg_level_desc was not persisted by the ingestion pipeline;
          it must be derived in staging from county_code (000 = STATE).
        columns:
          - name: state_alpha
            description: 2-letter state abbreviation.
          - name: state_fips_code
            description: 2-digit state FIPS code as a string.
          - name: county_code
            description: >
              3-digit county code as a string. '000' indicates a STATE-level
              record; non-zero codes indicate COUNTY-level records.
          - name: county_name
            description: County name as returned by NASS (empty for STATE rows).
          - name: commodity_desc
            description: Commodity name in upper case (e.g. CORN, SOYBEANS).
          - name: statisticcat_desc
            description: Statistic category (YIELD for all rows in this table).
          - name: unit_desc
            description: Unit of measure (e.g. BU / ACRE, TONS / ACRE).
          - name: short_desc
            description: Full item description combining commodity, statistic, and unit.
          - name: year
            description: Crop year (INTEGER).
          - name: value_raw
            description: >
              Raw string value from NASS. May be a number (possibly with
              thousands separators) or a suppression flag such as (D) or (Z).
          - name: _ingested_at
            description: UTC timestamp when the row was written to BigQuery.
